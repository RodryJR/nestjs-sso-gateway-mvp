services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tecopos
      POSTGRES_PASSWORD: tecopos123
      POSTGRES_DB: sso_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # [MODIFICADO POR IA] Se agrega -d sso_db: sin esto pg_isready intenta conectar
      # a una DB llamada "tecopos" (igual que el usuario) que no existe, generando
      # errores FATAL en los logs de postgres cada 5 segundos.
      test: ["CMD-SHELL", "pg_isready -U tecopos -d sso_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  sso-service:
    build: ./sso-service
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://tecopos:tecopos123@postgres:5432/sso_db
      JWT_SECRET: tecopos_jwt_secret_2026
      # [MODIFICADO POR IA] PORT agregado explicitamente para que el app escuche en el
      # puerto correcto dentro del contenedor, independiente del .env local.
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy

  banking-service:
    build: ./banking-service
    ports:
      - "3002:3002"
    environment:
      # [MODIFICADO POR IA] URL real del mockapi reemplazando el placeholder "TU_ID"
      # que tenia el docker-compose original; valor tomado del .env del servicio.
      MOCKAPI_BASE_URL: https://69cb00aaba5984c44bf403a2.mockapi.io/
      JWT_SECRET: tecopos_jwt_secret_2026
      SSO_SERVICE_URL: http://sso-service:3001
      # [MODIFICADO POR IA] PORT agregado explicitamente.
      PORT: 3002
    depends_on:
      - sso-service

  gateway:
    build: ./gateway
    ports:
      - "3000:3000"
    environment:
      SSO_SERVICE_URL: http://sso-service:3001
      BANKING_SERVICE_URL: http://banking-service:3002
      # [MODIFICADO POR IA] PORT agregado explicitamente; el .env local usa localhost
      # que NO funciona en Docker (los servicios se comunican por nombre de servicio).
      PORT: 3000
    depends_on:
      - sso-service
      - banking-service

volumes:
  postgres_data: